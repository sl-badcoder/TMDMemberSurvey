<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TUMuchData Member Survey</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&family=Fira+Sans:wght@700&display=swap"
    rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Fira Code", "Courier New", monospace;
      background: #292a2d;
      /* Gray-500 */
      color: #eaeaea;
      /* Gray-50 */
    }

    .page {
      max-width: 900px;
      margin: auto;
      padding: 32px 20px 80px;
    }

    nav {
      display: flex;
      gap: 24px;
      margin-bottom: 48px;
      font-size: 15px;
    }

    nav a {
      color: #eaeaea;
      /* Gray-50 */
      text-decoration: none;
      opacity: 0.75;
    }

    nav a:hover {
      opacity: 1;
      text-decoration: underline;
    }

    /* ── Icon at top ── */
    .header-icon {
      width: 100px;
      height: 100px;
      margin-bottom: 16px;
    }

    .tag {
      color: #9d9d9e;
      /* Gray-200 */
      margin-bottom: 12px;
    }

    h1 {
      font-family: "Fira Sans", sans-serif;
      font-weight: 700;
      font-size: clamp(42px, 8vw, 88px);
      line-height: 0.95;
      margin: 0 0 20px;
      letter-spacing: -4px;
    }

    .intro {
      max-width: 680px;
      color: #bdbdbe;
      /* Gray-100 */
      font-size: 18px;
      line-height: 1.6;
      margin-bottom: 48px;
    }

    form {
      display: grid;
      gap: 28px;
    }

    .question {
      border: 1px solid #545557;
      /* Gray-400 */
      background: #1d1e20;
      /* Gray-700 */
      padding: 24px;
      border-radius: 18px;
    }

    .question-title {
      display: block;
      font-size: 18px;
      margin-bottom: 18px;
    }

    .required {
      color: #cc4d4b;
      /* Red-400 */
    }

    .options {
      display: grid;
      gap: 12px;
    }

    .option {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border: 1px solid #545557;
      /* Gray-400 */
      border-radius: 14px;
      cursor: pointer;
      transition: 0.15s ease;
      color: #bdbdbe;
      /* Gray-100 */
    }

    .option:hover {
      border-color: #eaeaea;
      /* Gray-50 */
      background: #252629;
      /* Gray-600 */
    }

    .option:has(input:checked) {
      border-color: #eaeaea;
      /* Gray-50 */
      background: #3a3b3f;
      /* Gray-450 */
      color: #ffffff;
      box-shadow: inset 5px 0 0 #eaeaea;
      font-weight: 700;
    }

    .option:has(input:checked):hover {
      background: #424347;
      /* Gray-425 */
    }

    .option:has(input:focus-visible) {
      outline: 2px solid #eaeaea;
      outline-offset: 3px;
    }

    .other-input {
      display: none;
      margin-top: 12px;
    }

    .other-input.is-visible {
      display: block;
    }

    input[type="radio"],
    input[type="checkbox"] {
      accent-color: #eaeaea;
      /* Gray-50 */
    }

    input[type="text"],
    textarea {
      width: 100%;
      border: 1px solid #545557;
      /* Gray-400 */
      background: #292a2d;
      /* Gray-500 */
      color: #eaeaea;
      /* Gray-50 */
      padding: 16px;
      border-radius: 14px;
      font-family: inherit;
      font-size: 16px;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    /* ── Submit row ── */
    .form-actions {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-top: 20px;
      flex-wrap: wrap;
    }

    button[type="submit"] {
      background: #eaeaea;
      /* Gray-50 */
      color: #111213;
      /* Gray-900 */
      border: none;
      padding: 18px 26px;
      border-radius: 999px;
      font-family: inherit;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
      transition: transform 0.15s;
    }

    button[type="submit"]:hover {
      transform: translateY(-1px);
    }

    button[type="submit"]:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .note {
      color: #707072;
      /* Gray-300 */
      font-size: 14px;
      margin-top: 24px;
    }

    #success {
      display: none;
      margin-top: 32px;
      padding: 24px;
      border: 1px solid #545557;
      /* Gray-400 */
      border-radius: 18px;
      background: #1d1e20;
      /* Gray-700 */
    }

    #submit-status {
      display: none;
      color: #bdbdbe;
      /* Gray-100 */
      margin: 12px 0 0;
      font-size: 14px;
    }

    #submit-status.is-visible {
      display: block;
    }

    #submit-status.is-error {
      color: #d46a68;
      /* Red-300 */
    }

    /* ── Bottom bar ── */
    .bottom-bar {
      margin-top: 64px;
      padding: 28px 0 20px;
      border-top: 1px solid #545557;
      /* Gray-400 */
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .bottom-logo {
      width: min(220px, 70vw);
      height: auto;
      opacity: 0.65;
      transition: opacity 0.2s;
    }

    .bottom-logo:hover {
      opacity: 1;
    }
  </style>
</head>

  <iframe name="hidden_iframe" style="display:none;"></iframe>

  <script>
    const form = document.getElementById("survey-form");
    const success = document.getElementById("success");
    const submitButton = form.querySelector("button[type='submit']");
    const submitStatus = document.getElementById("submit-status");
    const hiddenIframe = document.querySelector("iframe[name='hidden_iframe']");
    const otherRadios = form.querySelectorAll("[data-other-target]");
    const requiredCheckboxes = form.querySelectorAll("[data-required-group]");
    let hasSubmitted = false;
    let submitTimeout;

    function syncOtherInputs() {
      otherRadios.forEach((radio) => {
        const input = document.getElementById(radio.dataset.otherTarget);
        const isSelected = radio.checked;
        input.classList.toggle("is-visible", isSelected);
        input.required = isSelected;
        if (!isSelected) input.value = "";
      });
    }

    function syncRequiredCheckboxes() {
      const groups = [...new Set([...requiredCheckboxes].map((checkbox) => checkbox.dataset.requiredGroup))];

      groups.forEach((group) => {
        const checkboxes = form.querySelectorAll(`[data-required-group="${group}"]`);
        const hasChecked = [...checkboxes].some((checkbox) => checkbox.checked);
        checkboxes.forEach((checkbox, index) => {
          checkbox.setCustomValidity(!hasChecked && index === 0 ? "Please select at least one option." : "");
        });
      });
    }

    form.addEventListener("change", syncOtherInputs);
    form.addEventListener("change", syncRequiredCheckboxes);
    syncOtherInputs();
    syncRequiredCheckboxes();

    hiddenIframe.addEventListener("load", function () {
      if (!hasSubmitted) return;
      clearTimeout(submitTimeout);
      hasSubmitted = false;
      form.style.display = "none";
      success.style.display = "block";
      window.scrollTo({ top: 0, behavior: "smooth" });
    });

    form.addEventListener("submit", function () {
      syncRequiredCheckboxes();

      hasSubmitted = true;
      submitButton.disabled = true;
      submitStatus.textContent = "Submitting...";
      submitStatus.classList.remove("is-error");
      submitStatus.classList.add("is-visible");

      clearTimeout(submitTimeout);
      submitTimeout = setTimeout(() => {
        hasSubmitted = false;
        submitButton.disabled = false;
        submitStatus.textContent = "Submission could not be confirmed. Please check your connection and try again.";
        submitStatus.classList.add("is-error");
      }, 15000);
    });
  </script>
